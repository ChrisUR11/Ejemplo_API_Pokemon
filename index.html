<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo API Pokemón</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <a href="https://www.pokemon.com/el" target="_blank">
            <img src="imagenes/pokemon_logo.png" alt="Logo de Pokémon" class="logo" id="logoPokemon">

        </a>
    </header>

    <main>
        <section>
            <input type="text" id="pokemonName" placeholder="Nombre o ID del Pokémon">
            <button id="btnBuscar">Buscar</button>
        </section>

        <section id="infoPokemon">
            <p>Ingrese nombre o id del Pokémon</p>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
